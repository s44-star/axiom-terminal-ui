<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AXIOM Terminal — DeFi Trading Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;font-family:'JetBrains Mono',monospace;}
:root{
  --v:#9D4EDD;--b:#00B4D8;--m:#FF006E;
  --text:#E6E6F0;--dim:rgba(230,230,240,0.45);
  --bg:#050507;--panel:#030308;
}
html,body{background:var(--bg);color:var(--text);overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#0a0a12;}
::-webkit-scrollbar-thumb{background:rgba(157,78,221,0.4);}
canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.7;}
#root{position:relative;z-index:1;}
.vignette{pointer-events:none;position:fixed;inset:0;z-index:1;
  background:radial-gradient(120% 80% at 50% 0%,rgba(157,78,221,0.08),transparent 55%);}
.terminal{min-height:100vh;position:relative;z-index:2;}

/* TICKER */
.ticker-wrap{overflow:hidden;border-bottom:1px solid rgba(157,78,221,0.26);background:#030307;position:relative;}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker 42s linear infinite;padding:6px 0;}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{padding:0 24px;font-size:11px;letter-spacing:.2em;color:var(--v);}
.ticker-item.alt{color:var(--b);}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;
  border-bottom:1px solid rgba(157,78,221,0.26);background:#050509;}
.logo-wrap{display:flex;align-items:center;gap:12px;}
.logo-icon{width:28px;height:28px;border:1px solid var(--v);display:flex;align-items:center;
  justify-content:center;color:var(--v);font-size:14px;box-shadow:0 0 10px rgba(157,78,221,0.35);}
.logo-text{font-size:13px;font-weight:700;letter-spacing:.3em;color:var(--text);}
.logo-text span{color:var(--b);}
.logo-sub{font-size:9px;letter-spacing:.35em;color:rgba(157,78,221,0.6);margin-top:2px;text-transform:uppercase;}
.nav{display:flex;gap:24px;}
@media(max-width:768px){.nav{display:none;}}
.nav a{font-size:11px;letter-spacing:.2em;color:var(--dim);text-decoration:none;text-transform:uppercase;cursor:pointer;}
.nav a.active{color:var(--v);}
.btn-connect{padding:8px 16px;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  border:1px solid var(--v);color:var(--v);background:transparent;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 0 12px rgba(157,78,221,0.2);transition:all .2s;}
.btn-connect:hover{background:rgba(157,78,221,0.1);box-shadow:0 0 20px rgba(157,78,221,0.4);}
.btn-connect.connected{background:var(--v);color:#000;box-shadow:0 0 20px rgba(157,78,221,0.6);}
.btn-pulse{position:absolute;inset:0;background:var(--v);mix-blend-mode:screen;
  animation:pulse 2.4s ease-in-out infinite;opacity:0;}
@keyframes pulse{0%,100%{opacity:0}50%{opacity:.22}}

/* HERO */
.hero{padding:20px 16px 12px;}
.hero-head{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
@media(min-width:768px){.hero-head{flex-direction:row;align-items:flex-end;justify-content:space-between;}}
.hero-title{font-size:clamp(20px,4vw,30px);font-weight:700;letter-spacing:.12em;color:var(--text);
  text-shadow:0 0 22px rgba(157,78,221,0.35);}
.hero-sub{font-size:11px;letter-spacing:.3em;color:rgba(0,180,216,0.7);text-transform:uppercase;margin-top:4px;}
.hero-status{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.2em;
  color:var(--dim);text-transform:uppercase;}
.dot{width:6px;height:6px;background:var(--v);box-shadow:0 0 6px var(--v);display:inline-block;
  animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* METRIC CARDS */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;}
@media(min-width:1024px){.metrics{grid-template-columns:repeat(4,1fr);}}
.metric-card{border:1px solid rgba(157,78,221,0.26);background:var(--panel);padding:12px;
  box-shadow:0 0 18px rgba(157,78,221,0.05) inset;animation:float linear infinite;}
.metric-card:nth-child(1){animation-duration:5s;animation-name:float1;}
.metric-card:nth-child(2){animation-duration:5.6s;animation-name:float2;}
.metric-card:nth-child(3){animation-duration:6.1s;animation-name:float3;}
.metric-card:nth-child(4){animation-duration:6.6s;animation-name:float4;}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes float4{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.metric-label{font-size:9px;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;}
.metric-value{font-size:24px;font-weight:700;margin-top:6px;tabular-nums:true;}
.metric-value.violet{color:var(--v);text-shadow:0 0 14px rgba(157,78,221,0.35);}
.metric-value.blue{color:var(--b);text-shadow:0 0 14px rgba(0,180,216,0.35);}
.metric-sub{font-size:10px;color:rgba(230,230,240,0.55);margin-top:4px;}

/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:1fr;gap:8px;padding:0 16px 24px;}
@media(min-width:1024px){.main-grid{grid-template-columns:4fr 5fr 3fr;}}
.col{display:flex;flex-direction:column;gap:8px;}

/* PANELS */
.panel{border:1px solid rgba(157,78,221,0.26);background:var(--panel);
  box-shadow:0 0 18px rgba(157,78,221,0.05) inset;}
.panel-header{display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;border-bottom:1px solid rgba(157,78,221,0.18);font-size:10px;
  letter-spacing:.25em;text-transform:uppercase;}
.panel-header.violet{color:var(--v);}
.panel-header.blue{color:var(--b);}
.live-dot{width:6px;height:6px;display:inline-block;animation:blink 1.5s ease-in-out infinite;}
.live-dot.violet{background:var(--v);box-shadow:0 0 6px var(--v);}
.live-dot.blue{background:var(--b);box-shadow:0 0 6px var(--b);}
.live-label{display:flex;align-items:center;gap:6px;}

/* CONSOLE */
.console-body{height:180px;overflow:hidden;padding:8px 12px;font-size:11px;line-height:1.7;}
.console-line{color:rgba(230,230,240,0.7);}
.console-line.ok{color:var(--b);}
.console-line.ready{color:var(--v);}
.cursor{display:inline-block;width:8px;height:12px;background:var(--b);
  animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px;}

/* SPARKLINE */
.spark-body{padding:12px;}
.spark-meta{display:grid;grid-template-columns:repeat(3,1fr);font-size:10px;
  color:var(--dim);margin-top:8px;}
.spark-meta span:nth-child(2){text-align:center;}
.spark-meta span:nth-child(3){text-align:right;}

/* MARKETS TABLE */
.tbl-head{display:grid;grid-template-columns:1.2fr 1fr 0.8fr 1fr 1fr;gap:8px;
  padding:6px 12px;font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;}
.tbl-row{display:grid;grid-template-columns:1.2fr 1fr 0.8fr 1fr 1fr;gap:8px;
  padding:8px 12px;font-size:11px;border-top:1px solid rgba(157,78,221,0.09);
  tabular-nums:true;transition:background .15s;}
.tbl-row:hover{background:rgba(157,78,221,0.05);}
.tbl-row span{color:var(--text);}
.tbl-row .sym{color:var(--text);}
.tbl-row .sym em{color:var(--dim);font-style:normal;}
.tbl-row .up{color:var(--b);font-weight:700;}
.tbl-row .dn{color:var(--m);font-weight:700;}
.tbl-row .dim{color:var(--dim);}

/* TRADES */
.trade-head{display:grid;grid-template-columns:0.8fr 1fr 1fr 1fr;gap:8px;
  padding:6px 12px;font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;}
.trade-row{display:grid;grid-template-columns:0.8fr 1fr 1fr 1fr;gap:8px;
  padding:5px 12px;font-size:11px;border-bottom:1px solid rgba(157,78,221,0.07);}
.trade-row .buy{color:var(--b);font-weight:700;}
.trade-row .sell{color:var(--m);font-weight:700;}
.trade-row span{color:var(--text);}
.trade-row .dim{color:var(--dim);}
.trade-row.new{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ORDER BOOK */
.ob-head{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;
  padding:4px 12px;font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}
.ob-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;
  padding:3px 8px;font-size:11px;position:relative;}
.ob-row .bar{position:absolute;inset-block:0;right:0;pointer-events:none;}
.ob-row.ask .bar{background:rgba(255,0,110,0.1);}
.ob-row.bid .bar{background:rgba(0,180,216,0.1);}
.ob-row.ask span:first-child{color:var(--m);}
.ob-row.bid span:first-child{color:var(--b);}
.ob-row span{color:var(--text);position:relative;z-index:1;}
.ob-row span:nth-child(2){text-align:right;}
.ob-row span:nth-child(3){text-align:right;color:var(--dim);}
.ob-mid{display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px;margin:4px 0;
  border-top:1px solid rgba(157,78,221,0.18);border-bottom:1px solid rgba(157,78,221,0.18);}
.ob-mid-price{font-size:13px;font-weight:700;color:var(--v);text-shadow:0 0 10px var(--v);}
.ob-mid-spread{font-size:9px;color:var(--dim);}

/* FOOTER */
.footer{display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-top:1px solid rgba(157,78,221,0.2);
  font-size:9px;letter-spacing:.25em;color:var(--dim);text-transform:uppercase;}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="vignette"></div>
<div id="root"></div>

<script>
// Canvas grid + particles
(function(){
  const c=document.getElementById('bg');
  const ctx=c.getContext('2d');
  let w,h,raf;
  const DPR=Math.min(window.devicePixelRatio||1,2);
  const isMobile=window.innerWidth<768;
  const pts=Array.from({length:isMobile?20:50},()=>({
    x:Math.random(),y:Math.random(),
    vy:0.00012+Math.random()*0.00024,
    s:Math.random()*1.4+0.3,
    blue:Math.random()>.6
  }));
  function resize(){
    w=window.innerWidth;h=window.innerHeight;
    c.width=w*DPR;c.height=h*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize();
  window.addEventListener('resize',resize);
  function draw(){
    ctx.clearRect(0,0,w,h);
    const cell=isMobile?56:46;
    ctx.lineWidth=1;ctx.strokeStyle='rgba(157,78,221,0.05)';
    ctx.beginPath();
    for(let x=0;x<=w;x+=cell){ctx.moveTo(x,0);ctx.lineTo(x,h);}
    for(let y=0;y<=h;y+=cell){ctx.moveTo(0,y);ctx.lineTo(w,y);}
    ctx.stroke();
    for(const p of pts){
      p.y-=p.vy;
      if(p.y<0){p.y=1;p.x=Math.random();}
      ctx.beginPath();
      const col=p.blue?'0,180,216':'157,78,221';
      ctx.fillStyle=`rgba(${col},${0.15+p.s*0.1})`;
      ctx.arc(p.x*w,p.y*h,p.s,0,Math.PI*2);
      ctx.fill();
    }
    raf=requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Simulated live data ──────────────────────────────────────
const MARKETS=[
  {sym:'BTC',pair:'BTC/USDT',price:67842.50,pct:2.14,high:68900,vol:2841000000},
  {sym:'ETH',pair:'ETH/USDT',price:3418.22,pct:1.47,high:3502,vol:1240000000},
  {sym:'SOL',pair:'SOL/USDT',price:182.04,pct:-0.83,high:188.5,vol:398000000},
  {sym:'BNB',pair:'BNB/USDT',price:608.10,pct:0.62,high:614,vol:287000000},
  {sym:'ARB',pair:'ARB/USDT',price:1.071,pct:-1.19,high:1.094,vol:142000000},
  {sym:'OP',pair:'OP/USDT',price:2.284,pct:3.21,high:2.31,vol:98000000},
  {sym:'LINK',pair:'LINK/USDT',price:18.42,pct:1.88,high:18.90,vol:176000000},
  {sym:'XRP',pair:'XRP/USDT',price:0.5821,pct:-0.44,high:0.5910,vol:312000000},
];

const BOOT_LINES=[
  {t:'>  INITIALIZING AXIOM TERMINAL v1.0...',cls:''},
  {t:'>  LOADING DESIGN SYSTEM [OK]',cls:'ok'},
  {t:'>  CONNECTING BINANCE WEBSOCKET...',cls:''},
  {t:'>  MARKET FEED LIVE — 8 PAIRS [OK]',cls:'ok'},
  {t:'>  ORDER BOOK DEPTH LOADED [OK]',cls:'ok'},
  {t:'>  RISK ENGINE NOMINAL — VAR 99% [OK]',cls:'ok'},
  {t:'>  TERMINAL READY.',cls:'ready'},
];

// ── Helpers ──────────────────────────────────────────────────
function fp(n,d=2){
  if(n==null)return'—';
  return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fPct(n){
  if(n==null)return'—';
  return`${n>0?'+':''}${Number(n).toFixed(2)}%`;
}
function fCompact(n){
  if(n==null)return'—';
  if(n>=1e9)return`$${(n/1e9).toFixed(2)}B`;
  if(n>=1e6)return`$${(n/1e6).toFixed(1)}M`;
  return`$${n.toFixed(0)}`;
}
function fTime(ts){
  return new Date(ts).toLocaleTimeString('en-US',{hour12:false});
}

// ── Live number jitter ───────────────────────────────────────
function useLive(base,spread,ms=1400){
  const[v,setV]=useState(base);
  useEffect(()=>{
    const id=setInterval(()=>setV(base+(Math.random()-.5)*spread),ms);
    return()=>clearInterval(id);
  },[base,spread,ms]);
  return v;
}

// ── Typewriter ───────────────────────────────────────────────
function useTypewriter(lines){
  const[out,setOut]=useState([]);
  const[done,setDone]=useState(false);
  useEffect(()=>{
    let cancelled=false;
    let li=0;const acc=[];
    async function run(){
      const sl=(ms)=>new Promise(r=>setTimeout(r,ms));
      while(li<lines.length&&!cancelled){
        const line=lines[li];let cur='';
        for(let i=0;i<line.t.length&&!cancelled;i++){
          cur+=line.t[i];acc[li]={t:cur,cls:line.cls};
          setOut([...acc]);await sl(12);
        }
        li++;await sl(200);
      }
      if(!cancelled)setDone(true);
    }
    run();
    return()=>{cancelled=true;};
  },[]);
  return{out,done};
}

// ── Simulated trade tape ──────────────────────────────────────
function useTrades(){
  const[rows,setRows]=useState(()=>
    Array.from({length:9},(_,i)=>({
      id:i,side:Math.random()>.5?'buy':'sell',
      price:3418.22+(Math.random()-.5)*4,
      amt:Math.random()*2+0.05,
      ts:Date.now()-i*3000,
      isNew:false,
    }))
  );
  useEffect(()=>{
    const id=setInterval(()=>{
      setRows(p=>[{
        id:Math.random(),side:Math.random()>.5?'buy':'sell',
        price:3418.22+(Math.random()-.5)*6,
        amt:Math.random()*2+0.05,
        ts:Date.now(),isNew:true,
      },...p].slice(0,9));
    },1100+Math.random()*400);
    return()=>clearInterval(id);
  },[]);
  return rows;
}

// ── Simulated order book ──────────────────────────────────────
function useOrderBook(){
  const[ob,setOb]=useState(null);
  useEffect(()=>{
    function gen(mid){
      const bids=[],asks=[];
      for(let i=0;i<8;i++){
        bids.push({p:mid-(i+1)*0.12-Math.random()*0.05,a:Math.random()*120+10});
        asks.push({p:mid+(i+1)*0.12+Math.random()*0.05,a:Math.random()*120+10});
      }
      return{bids,asks,mid,spread:asks[0].p-bids[0].p};
    }
    setOb(gen(3418.22));
    const id=setInterval(()=>setOb(gen(3418.22+(Math.random()-.5)*2)),800);
    return()=>clearInterval(id);
  },[]);
  return ob;
}

// ── Sparkline ────────────────────────────────────────────────
function useSparkline(){
  const[pts,setPts]=useState(()=>
    Array.from({length:60},(_,i)=>3400+Math.sin(i/4)*18+Math.random()*8)
  );
  useEffect(()=>{
    const id=setInterval(()=>
      setPts(p=>[...p.slice(1),3418+Math.sin(Date.now()/600)*14+Math.random()*10]),700);
    return()=>clearInterval(id);
  },[]);
  return pts;
}

// ── Components ───────────────────────────────────────────────

function Ticker(){
  const items=[...MARKETS,...MARKETS].map((m,i)=>(
    <span key={i} className={`ticker-item${i%3===1?' alt':''}`}>
      <span style={{opacity:.4}}>◈ </span>
      {m.sym} ${fp(m.price,m.price>100?2:4)}{' '}
      <span style={{color:m.pct>=0?'#00B4D8':'#FF006E'}}>
        {m.pct>=0?'▲':'▼'}{Math.abs(m.pct).toFixed(2)}%
      </span>
    </span>
  ));
  return(
    <div className="ticker-wrap">
      <div className="ticker-inner">{items}</div>
    </div>
  );
}

function TopBar({connected,onConnect}){
  return(
    <div className="topbar">
      <div className="logo-wrap">
        <div className="logo-icon">◇</div>
        <div>
          <div className="logo-text">AXIOM<span>·</span>TERMINAL</div>
          <div className="logo-sub">Proprietary · On-Chain Desk</div>
        </div>
      </div>
      <nav className="nav">
        <a className="active">Markets</a>
        <a>Order Book</a>
        <a>Trades</a>
        <a>On-Chain</a>
      </nav>

function MetricCards(){
  const eth=useLive(3418.22,12,1400);
  const btc=useLive(67842.5,120,1600);
  const gas=useLive(12,4,1200);

function BootConsole(){
  const{out,done}=useTypewriter(BOOT_LINES);
  return(
    <div className="panel">
      <div className="panel-header blue">
        System Console · NODE-07
        <div className="live-label"><div className="live-dot blue"/>{done?'READY':'BOOTING'}</div>
      </div>
      <div className="console-body">
        {out.map((l,i)=>(
          <div key={i} className={`console-line ${l.cls}`}>

          </div>

          </div>

      </div>
    </div>

function Sparkline(){
  const pts=useSparkline();
  const W=100,H=60;
  const max=Math.max(...pts),min=Math.min(...pts);
  const path=pts.map((v,i)=>{
    const x=(i/(pts.length-1))*W;
    const y=H-((v-min)/(max-min||1))*H;
    return`${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last=pts[pts.length-1];
  return(
    <div className="panel">
      <div className="panel-header violet">
        ETH · 1M Microstructure
        <div className="live-label"><div className="live-dot violet"/>LIVE</div>
      </div>
      <div className="spark-body">
        <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:90,display:'block'}}>
          <defs>
            <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#9D4EDD" stopOpacity=".4"/>
              <stop offset="100%" stopColor="#9D4EDD" stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={`${path} L${W},${H} L0,${H} Z`} fill="url(#sg)"/>
          <path d={path} fill="none" stroke="#9D4EDD" strokeWidth="1"
            style={{filter:'drop-shadow(0 0 3px #9D4EDD)'}}/>
        </svg>
        <div className="spark-meta">
          <span>O {fp(pts[0])}</span>
          <span>H {fp(max)}</span>
          <span>C {fp(last)}</span>
        </div>
      </div>
    </div>
  );
}

function MarketsTable(){
  return(
    <div className="panel">
      <div className="panel-header violet">
        Live Markets · 8 PAIRS
        <div className="live-label"><div className="live-dot violet"/>LIVE</div>
      </div>
      <div className="tbl-head">
        <span>Market</span><span style={{textAlign:'right'}}>Last</span>
        <span style={{textAlign:'right'}}>24h %</span>
        <span style={{textAlign:'right'}}>24h High</span>
        <span style={{textAlign:'right'}}>Volume</span>
      </div>
      {MARKETS.map((r,i)=>(
        <div key={i} className="tbl-row">
          <span className="sym">{r.sym}<em>/USDT</em></span>
          <span style={{textAlign:'right'}}>{fp(r.price,r.price>100?2:4)}</span>
          <span style={{textAlign:'right'}} className={r.pct>=0?'up':'dn'}>{fPct(r.pct)}</span>
          <span style={{textAlign:'right'}} className="dim">{fp(r.high,r.high>100?0:3)}</span>
          <span style={{textAlign:'right'}} className="dim">{fCompact(r.vol)}</span>
        </div>
      ))}
    </div>
  );
}

function TradesStream(){
  const rows=useTrades();
  return(
    <div className="panel">
      <div className="panel-header blue">
        Live Trade Tape · ETH/USDT
        <div className="live-label"><div className="live-dot blue"/>LIVE</div>
      </div>
      <div className="trade-head">
        <span>Side</span><span style={{textAlign:'right'}}>Price</span>
        <span style={{textAlign:'right'}}>Size</span><span style={{textAlign:'right'}}>Time</span>
      </div>
      {rows.map((r)=>(
        <div key={r.id} className={`trade-row${r.isNew?' new':''}`}>
          <span className={r.side}>{r.side.toUpperCase()}</span>
          <span style={{textAlign:'right'}}>{fp(r.price)}</span>
          <span style={{textAlign:'right'}}>{r.amt.toFixed(4)}</span>
          <span style={{textAlign:'right'}} className="dim">{fTime(r.ts)}</span>
        </div>
      ))}
    </div>
  );
}

function OrderBook(){
  const ob=useOrderBook();
  if(!ob)return(
    <div className="panel">
      <div className="panel-header blue">Order Book · ETH/USDT</div>
      <div style={{padding:12,color:'var(--dim)',fontSize:11}}>Loading…</div>
    </div>
  );
  const maxA=Math.max(...ob.asks.map(x=>x.a));
  const maxB=Math.max(...ob.bids.map(x=>x.a));
  return(
    <div className="panel">
      <div className="panel-header blue">
        Order Book · ETH/USDT
        <div className="live-label"><div className="live-dot blue"/>LIVE</div>
      </div>
      <div className="ob-head"><span>Price</span><span style={{textAlign:'right'}}>Size</span><span style={{textAlign:'right'}}>Total</span></div>
      {[...ob.asks].reverse().map((r,i)=>(
        <div key={`a${i}`} className="ob-row ask">
          <div className="bar" style={{width:`${(r.a/maxA)*100}%`}}/>
          <span>{fp(r.p)}</span>
          <span style={{textAlign:'right'}}>{r.a.toFixed(3)}</span>
          <span style={{textAlign:'right'}}>{fp(r.p*r.a,0)}</span>
        </div>
      ))}
      <div className="ob-mid">
        <span className="ob-mid-price">{fp(ob.mid)}</span>
        <span className="ob-mid-spread">SPREAD {fp(ob.spread)}</span>
      </div>
      {ob.bids.map((r,i)=>(
        <div key={`b${i}`} className="ob-row bid">
          <div className="bar" style={{width:`${(r.a/maxB)*100}%`}}/>
          <span>{fp(r.p)}</span>
          <span style={{textAlign:'right'}}>{r.a.toFixed(3)}</span>
          <span style={{textAlign:'right'}}>{fp(r.p*r.a,0)}</span>
        </div>
      ))}
    </div>
  );
}

function App(){
  const[connected,setConnected]=useState(false);
  return(
    <div className="terminal">
      <Ticker/>
      <TopBar connected={connected} onConnect={()=>setConnected(c=>!c)}/>
      <div className="hero">
        <div className="hero-head">
          <div>
            <div className="hero-title">ON-CHAIN EXECUTION DESK</div>
            <div className="hero-sub">Live markets · Order depth · Trade tape · On-chain analytics</div>
          </div>
          <div className="hero-status">
            <span className="dot"/>&nbsp;ALL SYSTEMS NOMINAL
          </div>
        </div>
        <MetricCards/>
      </div>
      <div className="main-grid">
        <div className="col">
          <BootConsole/>
          <Sparkline/>
        </div>
        <div className="col">
          <MarketsTable/>
          <TradesStream/>
        </div>
        <div className="col">
          <OrderBook/>
        </div>
      </div>
      <div className="footer">
        <span>AXIOM TERMINAL v1.0 · UI TEMPLATE</span>
        <span>CONNECT YOUR API · CUSTOMIZE · SHIP</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
